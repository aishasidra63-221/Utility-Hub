kind = "web"
previewPath = "/"
title = "Zero-Friction Tools Hub"
version = "1.0.0"
id = "artifacts/tools-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19212

[services.development]
run = "pnpm --filter @workspace/tools-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tools-hub", "run", "build" ]
publicDir = "artifacts/tools-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19212"
BASE_PATH = "/"
